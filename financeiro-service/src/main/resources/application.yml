spring:
  application:
    name: financeiro-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/ufmsos
    username: postgres
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

app:
  security:
    jwt:
      secret: 5a57afc4b448c0289f736c9dbf82c4963d2274c362bd633813c4d391834e7ead

server:
  port: 8082
