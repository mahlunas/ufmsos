server:
  port: 8080 # O Gateway será a porta de entrada principal

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth/(?<segment>.*), /v1/auth/${segment}

        - id: estudos-service
          uri: lb://estudos-service
          predicates:
            - Path=/estudos/**
          filters:
            - RewritePath=/estudos/(?<segment>.*), /v1/cursos/${segment}

        - id: ia-service
          uri: lb://ia-service
          predicates:
            - Path=/ia/**
          filters:
            - RewritePath=/ia/(?<segment>.*), /v1/ia/${segment}

        - id: financeiro-service
          uri: lb://financeiro-service
          predicates:
            - Path=/financeiro/**
          filters:
            - RewritePath=/financeiro/(?<segment>.*), /v1/financeiro/${segment}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
