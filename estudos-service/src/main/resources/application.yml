spring:
  application:
    name: estudos-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/ufmsos
    username: postgres
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081

app:
  security:
    jwt:
      secret: ${JWT_SECRET:ufmsos-secret-key-must-be-very-long-and-secure-123456-7890}
