services:
  ufmsos-db:
    image: postgres:17-alpine
    container_name: ufmsos-db
    environment:
      POSTGRES_DB: ufmsos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432" # Mapeado para 5433 para não conflitar com seu local (5432)
    volumes:
      - ./database/schema_inicial.sql:/docker-entrypoint-initdb.d/schema_inicial.sql
    networks:
      - ufmsos-network

  ms-estudos:
    build: ./estudos-service
    container_name: ms-estudos
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://ufmsos-db:5432/ufmsos
      DB_PASSWORD: postgres
    depends_on:
      - ufmsos-db
    networks:
      - ufmsos-network

  ms-financeiro:
    build: ./financeiro-service
    container_name: ms-financeiro
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://ufmsos-db:5432/ufmsos
      DB_PASSWORD: postgres
    depends_on:
      - ufmsos-db
    networks:
      - ufmsos-network

  ms-estagio:
    build: ./estagio-service
    container_name: ms-estagio
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://ufmsos-db:5432/ufmsos
      DB_PASSWORD: postgres
    depends_on:
      - ufmsos-db
    networks:
      - ufmsos-network

  ms-saude:
    build: ./saude-service
    container_name: ms-saude
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://ufmsos-db:5432/ufmsos
      DB_PASSWORD: postgres
    depends_on:
      - ufmsos-db
    networks:
      - ufmsos-network

  ms-rotina:
    build: ./rotina-service
    container_name: ms-rotina
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://ufmsos-db:5432/ufmsos
      DB_PASSWORD: postgres
    depends_on:
      - ufmsos-db
    networks:
      - ufmsos-network

  ms-curriculo:
    build: ./curriculo-service
    container_name: ms-curriculo
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://ufmsos-db:5432/ufmsos
      DB_PASSWORD: postgres
    depends_on:
      - ufmsos-db
    networks:
      - ufmsos-network

networks:
  ufmsos-network:
    driver: bridge
